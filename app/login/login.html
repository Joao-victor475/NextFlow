<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>nextflow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="logo_nexus.ico">

</head>
<body>
    
    <div = class="login-container">
        <img src="img/logo_nexus.png" alt="logo"class="logo"> 
        <h2>NextFlow</h2>
        <p class="Sistemadegestao">
            Sistema de Gestão - Login
        </p>
        
        <form>
            <div class="campo-grupo">
                <label for="CPF">CPF:</label>
                <div class="entrada">
                    <i class="fa fa-user"></i>
                    <input type="CPF" id="CPF" placeholder="Digite seu CPF" required> 
                </div>

            </div>
        
            <div class="campo-grupo">        
                <label for="senha">Senha:</label>
                <div class="entrada">
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                    <i class="fa fa-solid fa-lock"></i>
                </div>
            </div>
        
            <div class="botao_user">
                <a href="dashboard.html" class="bnt-login">Acessar Sistema</a>
                <span class="acessar-icone">&#9032;</span>
            </div>
            
            <div class="paragrafo-ou">
                 <p>ou</p>
            </div>
            
        </form>

        <div class="botao_user">
            <i class="fa fa-user acessar-icone"></i>
                <a href="tela_cadastro.html" class="bnt-login">
                    Cadastre-se
                </a>
        </div>

        <div class="Esqueceuasenha">
            <a href="Esqueceu_senha.html">Esqueceu a senha ? </a>
        </div>
        
    </div>
</body>
</html>
