<!DOCTYPE html>
<html lang="pt.br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>next-flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body>
    
    <div class="login-container">
        <h2>CADASTRO DE USUÁRIO</h2>
        
        <div class="descriçao">
            <p>
                PREENCHA SEUS DADOS
            </p>
        </div>
    
        <form>
            <div class="campo-grupo">
                <label for="nome">Nome:</label>
                <div class="entrada">
                    <i class="fa fa-user"></i>
                    <input type="CPF" id="CPF" placeholder="Nome Completo" required> 
                </div>
            </div>

            <div class="campo-grupo">
                <label for="nome">CPF:</label>
                <div class="entrada">
                    <i class="fa fa-user"></i>
                    <input type="CPF" id="CPF" placeholder="Numero do CPF" required> 
                </div>
            </div>
        
            <div class="campo-grupo">        
                <label for="senha">Email:</label>
                <div class="entrada">
                    <input type="password" id="senha" placeholder="Informe seu Email" required>
                    <i class="fa fa-at"></i>
                </div>
            </div>
        
            <div class="campo-grupo">
               <label for="telefone">Numero de Telefone</label>
               <div class="entrada">
                <input type="telefone" id="telefone" placeholder="Numero de Telefone" required>
                <i class="fa fa-mobile"></i>
               </div>
            </div>

            <div class="campo-grupo">
               <label for="Nova Senha">Senha</label>
               <div class="entrada">
                <input type="telefone" id="telefone" placeholder=" Nova Senha" required>
                <i class="fa fa-key"></i>
               </div>
            </div>

            <div class="campo-grupo">
               <label for="confirme-senha">Confirmar Senha</label>
               <div class="entrada">
                <input type="telefone" id="telefone" placeholder="Confirme sua nova senha" required>
                 <i class="fa fa-key"></i>
               </div>
            </div>

            <div class="acessar">
                <button type="submit" class="bnt-login">Efetuar Cadastro</button>
                <i class="acessar-icone fa fa-user-plus"></i>
    
            </div>

    </form>
    </div>

</body>
</html>
